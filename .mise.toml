[tools]
hk = "latest"
pkl = "latest"

[tasks.install]
description = "brew update + brew bundle from Brewfile"
run = [
    "brew update --quiet",
    "brew bundle",
]

[tasks.link]
description = "Symlink dotfiles into $HOME"
run = [
    "ln -sfn $HOME/dotfiles/.gitconfig          $HOME/.gitconfig",
    "ln -sfn $HOME/dotfiles/.tmux               $HOME/.tmux",
    "ln -sfn $HOME/dotfiles/.config             $HOME/.config",
    "ln -sfn $HOME/dotfiles/.markdownlint.yaml  $HOME/.markdownlint.yaml",
]

[tasks.unlink]
description = "Remove dotfiles symlinks from $HOME"
run = [
    "rm -f $HOME/.gitconfig",
    "rm -f $HOME/.tmux",
    "rm -f $HOME/.config",
    "rm -f $HOME/.markdownlint.yaml",
]

[tasks.bootstrap]
description = "Full setup: brew bundle, symlinks, mise tools, hk hooks"
depends = ["install", "link"]
run = [
    "mise install",
    "hk install",
]
