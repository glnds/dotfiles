# set default shell
if-shell '[[ $(uname -m) = arm64 ]]' { 
  set-option -g default-shell /opt/homebrew/bin/fish
} { 
  set-option -g default-shell /usr/local/bin/fish
  set-option -g default-command /usr/local/bin/fish
}
 set-option -g focus-events on
 # use /full/path/to/fish if it's not in $PATH

# Enable pbpaste, pbcopy in tmux
#set-option -g default-command "reattach-to-user-namespace -l zsh"


# https://dev.to/terkwood/fast-scrolling-with-tmux-and-alacritty-3dmn
set -g mouse on

# bind -n PPage copy-mode -eu
# bind -T copy-mode Home send-keys -X history-top
# bind -T copy-mode End copy-mode -q

# Support 256 colors
set -g default-terminal "tmux-256color"
set -as terminal-features 'tmux-256color:RGB'
set -as terminal-overrides ',alacritty:RGB'

# Enable passthrough for DEC 2026 synchronized output (fixes Claude Code TUI flicker)
set -g allow-passthrough all
set -g set-clipboard on

# Forward modified Enter keys from Alacritty as C-j for Claude Code newlines
set -s user-keys[0] "\033[220~"
set -s user-keys[1] "\033[221~"
set -s user-keys[2] "\033[222~"
bind-key -n User0 send-keys C-j
bind-key -n User1 send-keys C-j
bind-key -n User2 send-keys C-j

# Set the repeat time
set -g repeat-time 250

# Refresh status bar info every 60 seconds
set -g status-interval 60

# Cyberdream status line (matches Neovim cyberdream theme)
set -g status-style "bg=#16181a,fg=#ffffff"
set -g status-left-length 30
set -g status-right-length 80
set -g status-left "#[bg=#ffbd5e,fg=#16181a,bold]  #S #[bg=#16181a,fg=#ffbd5e]"
set -g status-right "#{?@aws-profile,#[fg=#FF9900]#[bg=#FF9900]#[fg=#232F3E] ☁ #{@aws-profile} ,}#[fg=#ffffff]#[bg=#ffffff,fg=#16181a]  #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '-') #[fg=#3c4048]#[bg=#3c4048,fg=#ffffff]  %H:%M "
set -g window-status-format "#[fg=#7b8496] #I:#W "
set -g window-status-current-format "#[fg=#16181a,bg=#5eff6c]#[fg=#16181a,bg=#5eff6c,bold] #I:#W #[fg=#5eff6c,bg=#16181a]"
set -g window-status-separator ""
set -g window-status-activity-style "fg=#f1ff5e"
set -g pane-border-style "fg=#3c4048"
set -g pane-active-border-style "fg=#5eff6c"
set -g message-style "bg=#ffbd5e,fg=#16181a,bold"
set -g message-command-style "bg=#3c4048,fg=#ffffff"

# Enable vi mode for scrolling in copy mode
set -g mode-keys vi


# Align copy mode with vim
unbind [
bind Escape copy-mode
unbind p
bind p previous-window
bind ] paste-buffer

# Use CTRL-a as prefix
set -g prefix C-a

# Unbind the CTRL-b combo
unbind C-b

# Increase the command response time
set -s escape-time 10

# Set the window index to be 1 based
set -g base-index 1

# Set the pane index to be 1 based
set -g pane-base-index 1

# Auto-renumber windows when one is closed
set -g renumber-windows on

# Bind PREFIX r to reload the tmux config file
bind r source-file ~/.tmux.conf \; display 'Reloaded!' 

# Allow send through of the tmux PREFIX
bind C-a send-prefix

# Open Claude Code in a side pane
bind C split-window -h -l 50% 'claude --allow-dangerously-skip-permissions'

# Split panes horizontally
bind | split-window -h

# Split panes vertically
bind - split-window -v

# Align pane movement with vim
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Align window movement with vim
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Remap pane resizing shorcuts
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Monitor activity in other windows
setw -g monitor-activity on
set -g visual-activity off

# Smart pane switching with awareness of Vim splits and fzf.
# See: https://github.com/christoomey/vim-tmux-navigator
not_tmux="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?(g?(view|n?vim?x?)(diff)?|fzf)$'"
bind-key -n C-h if-shell "$not_tmux" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$not_tmux" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$not_tmux" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$not_tmux" "send-keys C-l"  "select-pane -R"
bind-key -n C-\\ if-shell "$not_tmux" "send-keys C-\\" "select-pane -l"


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
